# CLI nav under "CLI" is replaced at build time by tools/docgen/hooks.py using
# docs/cli/_generated_nav.json (run `just docs-generate` after CLI changes).
site_name: dnsight
site_url: https://dnsight.github.io/dnsight/
repo_url: https://github.com/dnsight/dnsight
edit_uri: edit/main/docs/

theme:
  name: material
  # Styling via supported theme keys only (no custom templates/CSS) — easier to
  # carry forward across Material/MkDocs upgrades than overrides.
  palette:
    - media: '(prefers-color-scheme: light)'
      scheme: default
      primary: indigo
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: '(prefers-color-scheme: dark)'
      scheme: slate
      primary: indigo
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - toc.follow
    - content.code.copy
    - search.suggest
    - search.highlight

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true

hooks:
  - tools/docgen/hooks.py

nav:
  - Home: index.md
  - Configuration: configuration.md
  # CLI subtree replaced at build time by tools/docgen/hooks.py (see docs/cli/_generated_nav.json).
  - CLI: []
  - API:
      - Overview: api/index.md
      - dnsight: api/dnsight.md
      - dnsight.core: api/core.md
  - Contributing: contributing.md

markdown_extensions:
  - attr_list
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
