# Python version (must match pyproject.toml)
sonar.python.version=3.11,3.12,3.13,3.14

# Path to sources
sonar.sources=src/dnsight
sonar.exclusions=**/__pycache__/**,**/*.pyc,**/.venv/,**/venv/,**/dist/,**/build/,**/*.egg-info/,**/.eggs/,**/.tox/,**/.mypy_cache/,**/.ruff_cache/

# Path to tests
sonar.tests=tests
sonar.test.exclusions=**/__pycache__/**,**/*.pyc
sonar.test.inclusions=tests/**/*.py

# Source encoding
sonar.sourceEncoding=UTF-8

# Coverage and test reports (from pytest-cov and pytest --junitxml)
sonar.python.coverage.reportPaths=coverage.xml
sonar.junit.reportPaths=junit.xml

# Exclusions for copy-paste detection (minimal/boilerplate files)
sonar.cpd.exclusions=**/__init__.py
