# Mandatory for SonarQube
sonar.projectKey=dnsight_dnsight
sonar.organization=dnsight

# Python version (matches CI – Sonar only runs on 3.14 matrix)
sonar.python.version=3.14

# Path to sources
sonar.sources=src/dnsight
sonar.exclusions=**/__pycache__/**,**/*.pyc,**/.venv/,**/venv/,**/dist/,**/build/,**/*.egg-info/,**/.eggs/,**/.tox/,**/.mypy_cache/,**/.ruff_cache/

# Path to tests
sonar.tests=tests
sonar.test.exclusions=**/__pycache__/**,**/*.pyc
sonar.test.inclusions=tests/**/*.py

# Source encoding
sonar.sourceEncoding=UTF-8

# Coverage and test reports (from pytest-cov and pytest --junitxml)
sonar.python.coverage.reportPaths=coverage.xml
sonar.junit.reportPaths=junit.xml

# Exclusions for copy-paste detection (minimal/boilerplate files)
sonar.cpd.exclusions=**/__init__.py

# Paths are repo-root-relative (matches component keys like dnsight_dnsight:src/dnsight/...).
#
# Schema: PascalCase Annotated / TypeAlias names are intentional API (python:S116).
# CAA/DMARC Typer callbacks exceed default arity (python:S107); signatures match SDK overlays.
# Typer Annotated[..., Option()] and schema Literal aliases stay TypeAlias (python:S6794).
# BaseCheck abstracts use a shared TypeVar across methods (python:S6796).
# SMTP helpers pass per-read timeouts into asyncio.wait_for (python:S7483).
# FakeDNSResolver keeps protocol parity with sync bodies (python:S7503).
sonar.issue.ignore.multicriteria=e1,e2,e3,e4,e5,e6,e7,e8,e9,e10
sonar.issue.ignore.multicriteria.e1.ruleKey=python:S116
sonar.issue.ignore.multicriteria.e1.resourceKey=src/dnsight/core/schema/**/*
sonar.issue.ignore.multicriteria.e2.ruleKey=python:S107
sonar.issue.ignore.multicriteria.e2.resourceKey=src/dnsight/cli/commands/caa.py
sonar.issue.ignore.multicriteria.e3.ruleKey=python:S107
sonar.issue.ignore.multicriteria.e3.resourceKey=src/dnsight/cli/commands/dmarc.py
sonar.issue.ignore.multicriteria.e4.ruleKey=python:S6794
sonar.issue.ignore.multicriteria.e4.resourceKey=src/dnsight/cli/helpers.py
sonar.issue.ignore.multicriteria.e5.ruleKey=python:S6794
sonar.issue.ignore.multicriteria.e5.resourceKey=src/dnsight/cli/output.py
sonar.issue.ignore.multicriteria.e6.ruleKey=python:S6794
sonar.issue.ignore.multicriteria.e6.resourceKey=src/dnsight/serialisers/base.py
sonar.issue.ignore.multicriteria.e7.ruleKey=python:S6794
sonar.issue.ignore.multicriteria.e7.resourceKey=src/dnsight/core/schema/**/*
sonar.issue.ignore.multicriteria.e8.ruleKey=python:S6796
sonar.issue.ignore.multicriteria.e8.resourceKey=src/dnsight/checks/base.py
sonar.issue.ignore.multicriteria.e9.ruleKey=python:S7483
sonar.issue.ignore.multicriteria.e9.resourceKey=src/dnsight/utils/smtp.py
sonar.issue.ignore.multicriteria.e10.ruleKey=python:S7503
