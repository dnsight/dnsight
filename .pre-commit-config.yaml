# Intentionally minimal: secrets + ruff; full lint/format/typecheck in CI (just check).
# Keep pinned SHAs for supply chain security.
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.5
    hooks:
      - id: ruff-check
      - id: ruff-format
        args: [--check]

  - repo: https://github.com/AikidoSec/pre-commit
    rev: 77ecd16894235d3260203df342995eda0f14c5b5
    hooks:
      - id: aikido-local-scanner
