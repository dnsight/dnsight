# Intentionally minimal: secrets + ruff; full lint/format/typecheck in CI (just check).
# Keep pinned SHAs for supply chain security.
default_install_hook_types:
  - pre-commit
  - commit-msg

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.8
    hooks:
      - id: ruff-check
      - id: ruff-format
        args: [--check]

  - repo: https://github.com/AikidoSec/pre-commit
    rev: 77ecd16894235d3260203df342995eda0f14c5b5
    hooks:
      - id: aikido-local-scanner

  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: 5c3f3c61b143a94e9ab5d767ff4d0dc9d6801aa3  # v4.3.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: [feat, fix, docs, chore, deps, refactor, test, ci, rm]
