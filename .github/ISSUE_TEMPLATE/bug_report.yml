name: Bug report
description: Report unexpected behaviour or a crash
labels: [bug]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Please include enough detail for someone else to reproduce the problem.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong, in one or two sentences?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Commands, config snippets, or code (redact secrets).
      placeholder: |
        1. …
        2. …
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: dnsight version, Python version, OS, install method (e.g. pipx
        / uv), if known.
    validations:
      required: false
