name: Feature request
description: Suggest an idea or improvement
labels: [enhancement]

body:
  - type: markdown
    attributes:
      value: |
        Describe the problem you are solving, not only the solution you have in mind.

  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What is hard, missing, or inconsistent today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed approach
      description: Optional — how you would like it to work (CLI, SDK, config, etc.).
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
