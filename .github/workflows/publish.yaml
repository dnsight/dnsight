name: Publish

on:
  release:
    types: [published]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.release.tag_name }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    # Prefer tag_name over github.ref (release payload is the source of truth for the tag).
    if: ${{ startsWith(github.event.release.tag_name, 'v') }}
    permissions:
      contents: write  # checkout + release notes + assets
      id-token: write  # PyPI trusted publishing
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0  # required for hatch-vcs to resolve version from tag
          ref: ${{ github.event.release.tag_name }}
      - name: Setup
        uses: ./.github/actions/setup

      - name: Generate release notes
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: just release-notes "${{ github.event.release.tag_name }}" release-notes.md

      - name: Build
        run: just build

      - name: Publish to PyPI
        run: uv publish

      - name: Upload release assets and notes
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b  # v2.5.0
        with:
          tag_name: ${{ github.event.release.tag_name }}
          body_path: release-notes.md
          files: |-
            dist/*.whl
            dist/*.tar.gz
