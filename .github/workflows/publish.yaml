name: Publish

on:
  release:
    types: [published]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    permissions:
      contents: write  # checkout + upload release assets
      id-token: write  # PyPI trusted publishing
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0  # required for hatch-vcs to resolve version from tag
      - name: Setup
        uses: ./.github/actions/setup

      - name: Verify changelog matches release tag
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ github.event.release.tag_name }}"
          VER="${TAG#v}"
          if ! grep -Fq "## [${VER}]" CHANGELOG.md; then
            echo "CHANGELOG.md must contain a '## [${VER}]' section (run towncrier build before tagging)."
            exit 1
          fi
          shopt -s nullglob
          fragments=(changelog.d/*.md)
          if ((${#fragments[@]})); then
            echo "Remove pending news fragments in changelog.d/ before release (leftover: ${fragments[*]})."
            exit 1
          fi

      - name: Build
        run: just build

      - name: Publish to PyPI
        run: uv publish

      - name: Upload release assets
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b  # v2.5.0
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: |-
            dist/*.whl
            dist/*.tar.gz
