name: Publish

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0  # required for hatch-vcs to resolve version from tag

      - uses: ./.github/actions/setup

      - name: Build
        run: just build

      - name: Publish to PyPI
        run: uv publish
