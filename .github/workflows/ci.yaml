name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - LICENSE
  pull_request:
    branches: [main]
    paths-ignore:
      - LICENSE

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Linting and type checking - only run on latest python v
  check:
    name: Check
    runs-on: ubuntu-latest
    permissions:
      contents: read  # checkout
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup
        uses: ./.github/actions/setup

      - name: Run checks
        shell: bash
        run: just check

      - name: Build package
        shell: bash
        run: just build

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup
        uses: ./.github/actions/setup
        with:
          uv_groups: docs

      - name: Regenerate CLI documentation
        shell: bash
        run: uv run --group docs python -m tools.docgen

      - name: Check docs/cli matches generator output
        shell: bash
        run: |
          set -euo pipefail
          if ! git diff --exit-code -- docs/cli/; then
            echo "::error::docs/cli is out of sync with the CLI. Run \`just docs-generate\`" \
              "(or \`uv run --group docs python -m tools.docgen\`) and commit under docs/cli/."
            git diff -- docs/cli/ || true
            exit 1
          fi

      - name: Build MkDocs (strict)
        shell: bash
        run: uv run --group docs mkdocs build --strict

  # Tests - matrix across Python versions
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    permissions:
      contents: read  # checkout
    strategy:
      fail-fast: false  # run all versions even if one fails
      matrix:
        python-version: ['3.11', '3.12', '3.13', '3.14']
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run tests
        run: just test

      - name: Upload coverage
        if: ${{ github.event_name == 'push' && !cancelled() && matrix.python-version == '3.14' }}
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de  # v5.5.2
        with:
          files: coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload test results to Codecov
        if: ${{ github.event_name == 'push' && !cancelled() && matrix.python-version == '3.14' }}
        uses: codecov/test-results-action@0fa95f0e1eeaafde2c782583b36b28ad0d8c77d3  # v1.2.1
        with:
          files: junit.xml
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Scan Code
        if: ${{ !cancelled() && matrix.python-version == '3.14' }}
        uses: ./.github/actions/scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
