version: 2

updates:
  # Keep GitHub Actions SHA pins up to date
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "deps:"
    groups:
      actions:
        patterns: ['*']  # group all action updates into one PR

  # Keep Python dependencies up to date
  - package-ecosystem: uv
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "deps:"
    groups:
      python-deps:
        patterns: ['*']
