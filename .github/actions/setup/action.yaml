name: Setup Environment
description: Installs just, uv, python, and project dependencies from the lockfile

inputs:
  python-version:
    description: Python version to use
    required: false
    default: '3.14'
  install-deps:
    description: Whether to run uv sync (lockfile install)
    required: false
    default: 'true'
  uv_groups:
    description: >-
      Space-separated extra uv dependency groups to pass as --group (e.g. docs).
      Empty means uv sync --frozen only (same as just install-ci).
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Install safe-chain
      shell: bash
      run: curl -fsSL https://github.com/AikidoSec/safe-chain/releases/latest/download/install-safe-chain.sh | sh -s -- --ci

    - name: Install just
      uses: extractions/setup-just@f8a3cce218d9f83db3a2ecd90e41ac3de6cdfd9b  # v3

    - name: Install uv
      uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098  # v7.3.1
      with:
        enable-cache: true
        python-version: ${{ inputs.python-version }}

    - name: Install dependencies
      if: inputs.install-deps == 'true'
      shell: bash
      env:
        SETUP_UV_GROUPS: ${{ inputs.uv_groups }}
      run: |-
        set -euo pipefail
        sync_args=(--frozen)
        if [[ -n "${SETUP_UV_GROUPS// /}" ]]; then
          read -ra _groups <<< "${SETUP_UV_GROUPS}"
          for g in "${_groups[@]}"; do
            [[ -z "${g}" ]] && continue
            sync_args+=(--group "${g}")
          done
        fi
        uv sync "${sync_args[@]}"
